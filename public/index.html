<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bundle Tester</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --s: #13131a;
      --s2: #1a1a24;
      --s3: #20202c;
      --b: #262636;
      --b2: #32324a;
      --a: #7c6ef0;
      --a2: #5c50c8;
      --a3: #3d3580;
      --t: #e4e2f4;
      --t2: #9896b4;
      --t3: #5a5874;
      --ok: #3ecf82;
      --ok2: #1a5c3a;
      --er: #e05565;
      --er2: #5c1a24;
      --warn: #d49a3a;
      --head-c: #60b4f0;
      --body-c: #a06ef0;
      --lib-c: #f0a060;
      --mn: 'DM Mono', 'Fira Mono', 'Consolas', monospace;
      --ss: system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      background: var(--bg);
      color: var(--t);
      font-family: var(--mn);
      font-size: 12px;
      display: flex;
      flex-direction: column
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--b2);
      border-radius: 2px
    }

    /* ── Header ── */
    .hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--s);
      border-bottom: 1px solid var(--b);
      flex-shrink: 0
    }

    .hdr-logo {
      font-size: 11px;
      letter-spacing: .14em;
      color: var(--a);
      text-transform: uppercase
    }

    .hdr-sep {
      flex: 1
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--t3);
      transition: background .3s, box-shadow .3s;
      flex-shrink: 0
    }

    .dot.ok {
      background: var(--ok);
      box-shadow: 0 0 6px var(--ok)
    }

    .dot.er {
      background: var(--er)
    }

    .dot.ld {
      background: var(--warn);
      animation: pulse .8s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    #status-lbl {
      font-size: 10px;
      color: var(--t3);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    /* ── Connection bar ── */
    .conn {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      padding: 8px 16px;
      background: var(--s2);
      border-bottom: 1px solid var(--b);
      flex-shrink: 0
    }

    .conn label {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .07em;
      white-space: nowrap
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden
    }

    /* ── Sidebar ── */
    .side {
      border-right: 1px solid var(--b);
      display: flex;
      flex-direction: column;
      background: var(--s);
      overflow: hidden
    }

    .side-tabs {
      display: flex;
      border-bottom: 1px solid var(--b);
      flex-shrink: 0
    }

    .side-tab {
      flex: 1;
      padding: 7px 2px;
      text-align: center;
      font-size: 9px;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--t3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .15s
    }

    .side-tab.active {
      color: var(--a);
      border-bottom-color: var(--a)
    }

    .side-tab:hover:not(.active) {
      color: var(--t2)
    }

    .side-tab.lib-tab.active {
      color: var(--lib-c);
      border-bottom-color: var(--lib-c)
    }

    .side-search {
      padding: 8px;
      border-bottom: 1px solid var(--b);
      flex-shrink: 0
    }

    .side-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px
    }

    /* ── List items ── */
    .item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 8px;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .12s;
      margin-bottom: 1px
    }

    .item:hover {
      background: var(--s2);
      border-color: var(--b)
    }

    .item.active {
      background: #1a1630;
      border-color: var(--a3)
    }

    .item.selected-lib {
      background: #201408;
      border-color: #5c3a10
    }

    .item-icon {
      font-size: 9px;
      color: var(--t3);
      width: 16px;
      text-align: center;
      flex-shrink: 0;
      font-family: var(--mn)
    }

    .item-name {
      flex: 1;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .item-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--b);
      color: var(--t3);
      white-space: nowrap
    }

    .item-badge.head {
      background: #0e1a28;
      color: var(--head-c)
    }

    .item-badge.body {
      background: #160e2a;
      color: var(--body-c)
    }

    .item-badge.lib {
      background: #201408;
      color: var(--lib-c)
    }

    .side-footer {
      padding: 8px;
      border-top: 1px solid var(--b);
      flex-shrink: 0;
      display: flex;
      gap: 5px
    }

    /* ── Main ── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0
    }

    .main-tabs {
      display: flex;
      border-bottom: 1px solid var(--b);
      background: var(--s);
      flex-shrink: 0
    }

    .main-tab {
      padding: 9px 16px;
      font-size: 11px;
      color: var(--t3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .15s;
      white-space: nowrap
    }

    .main-tab.active {
      color: var(--t);
      border-bottom-color: var(--a)
    }

    .main-tab:hover:not(.active) {
      color: var(--t2)
    }

    /* ── Panel ── */
    .panel {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: none
    }

    .panel.active {
      display: block
    }

    /* ── Inputs ── */
    input,
    select,
    textarea {
      background: var(--s2);
      border: 1px solid var(--b);
      color: var(--t);
      border-radius: 5px;
      padding: 7px 9px;
      font-family: var(--mn);
      font-size: 11px;
      outline: none;
      transition: border-color .15s;
      width: 100%
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--a)
    }

    textarea {
      resize: vertical;
      min-height: 60px
    }

    select option {
      background: var(--s2)
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 5px;
      border: none;
      font-family: var(--mn);
      font-size: 11px;
      cursor: pointer;
      transition: all .14s;
      white-space: nowrap;
      flex-shrink: 0
    }

    .btn:disabled {
      opacity: .35;
      cursor: not-allowed
    }

    .btn-p {
      background: var(--a);
      color: #fff
    }

    .btn-p:hover:not(:disabled) {
      background: var(--a2)
    }

    .btn-g {
      background: transparent;
      color: var(--t2);
      border: 1px solid var(--b)
    }

    .btn-g:hover:not(:disabled) {
      border-color: var(--b2);
      color: var(--t)
    }

    .btn-ok {
      background: transparent;
      color: var(--ok);
      border: 1px solid var(--ok2)
    }

    .btn-ok:hover:not(:disabled) {
      background: #0a2018
    }

    .btn-er {
      background: transparent;
      color: var(--er);
      border: 1px solid var(--er2)
    }

    .btn-er:hover:not(:disabled) {
      background: #200a10
    }

    .btn-head {
      background: #0e1a28;
      color: var(--head-c);
      border: 1px solid #2a4a6a
    }

    .btn-head:hover:not(:disabled) {
      background: #142030
    }

    .btn-body {
      background: #160e2a;
      color: var(--body-c);
      border: 1px solid #3a2a6a
    }

    .btn-body:hover:not(:disabled) {
      background: #1e1436
    }

    .btn-lib {
      background: #201408;
      color: var(--lib-c);
      border: 1px solid #5c3a10
    }

    .btn-lib:hover:not(:disabled) {
      background: #2c1c0a
    }

    .btn-sm {
      padding: 4px 9px;
      font-size: 10px
    }

    .btn-xs {
      padding: 2px 7px;
      font-size: 10px
    }

    /* ── Row helpers ── */
    .row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap
    }

    .col {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .fg {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .fg label {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .07em
    }

    .fg .hint {
      font-size: 10px;
      color: var(--t3);
      margin-top: -1px
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .full {
      grid-column: 1/-1
    }

    /* ── Section ── */
    .sec {
      margin-bottom: 18px
    }

    .sec-label {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 8px
    }

    .divider {
      border: none;
      border-top: 1px solid var(--b);
      margin: 14px 0
    }

    /* ── Tags ── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      cursor: pointer;
      transition: all .12s
    }

    .tag-mod {
      background: var(--s3);
      border: 1px solid var(--b);
      color: var(--t2)
    }

    .tag-mod:hover {
      border-color: var(--a3);
      color: var(--a)
    }

    .tag-lib {
      background: #201408;
      border: 1px solid #5c3a10;
      color: var(--lib-c)
    }

    .tag-lib:hover {
      border-color: #8c5a18
    }

    .tag-head {
      background: #0e1a28;
      border: 1px solid #2a4a6a;
      color: var(--head-c)
    }

    .tag-body {
      background: #160e2a;
      border: 1px solid #3a2a6a;
      color: var(--body-c)
    }

    .tag-rem {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      font-size: 11px;
      padding: 0;
      line-height: 1;
      opacity: .7
    }

    .tag-rem:hover {
      opacity: 1
    }

    /* ── Sortable list ── */
    .sort-list {
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    .sort-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 4px;
      background: var(--s3);
      border: 1px solid var(--b);
      cursor: grab;
      font-size: 11px
    }

    .sort-item:active {
      cursor: grabbing
    }

    .sort-handle {
      color: var(--t3);
      font-size: 10px;
      cursor: grab;
      user-select: none
    }

    .sort-idx {
      color: var(--t3);
      font-size: 9px;
      width: 14px;
      text-align: right
    }

    /* ── File list (libmod) ── */
    .file-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 4px;
      background: var(--s3);
      border: 1px solid var(--b);
      margin-bottom: 3px;
      font-size: 11px
    }

    .file-row:hover {
      border-color: var(--b2)
    }

    .file-path {
      flex: 1;
      color: var(--t2);
      font-size: 10px;
      word-break: break-all
    }

    .file-slot-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0
    }

    .file-slot-badge.head {
      background: #0e1a28;
      color: var(--head-c)
    }

    .file-slot-badge.body {
      background: #160e2a;
      color: var(--body-c)
    }

    /* ── URL box ── */
    .url-box {
      padding: 8px 10px;
      background: var(--s2);
      border: 1px solid var(--b);
      border-radius: 5px;
      font-size: 11px;
      color: var(--t2);
      word-break: break-all;
      cursor: pointer;
      transition: border-color .15s;
      line-height: 1.6
    }

    .url-box:hover {
      border-color: var(--a)
    }

    .url-box .param-page {
      color: var(--a)
    }

    .url-box .param-head {
      color: var(--head-c)
    }

    .url-box .param-body {
      color: var(--body-c)
    }

    .url-box .param-needs {
      color: var(--ok)
    }

    .url-box .param-lib {
      color: var(--lib-c)
    }

    /* ── Output ── */
    .out {
      font-size: 11px;
      padding: 10px;
      background: var(--s2);
      border: 1px solid var(--b);
      border-radius: 5px;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
      color: var(--t2);
      min-height: 50px;
      max-height: 260px;
      overflow-y: auto
    }

    .out.ok {
      border-color: var(--ok2);
      color: var(--ok)
    }

    .out.er {
      border-color: var(--er2);
      color: var(--er)
    }

    /* ── Chips ── */
    .chips {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 8px
    }

    .chip {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      border: 1px solid var(--b);
      color: var(--t2)
    }

    .chip.ok {
      border-color: var(--ok2);
      color: var(--ok)
    }

    .chip.er {
      border-color: var(--er2);
      color: var(--er)
    }

    .chip.hit {
      border-color: #2a4a2a;
      color: var(--ok)
    }

    .chip.mis {
      border-color: var(--b);
      color: var(--t3)
    }

    /* ── Empty ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 8px;
      color: var(--t3);
      text-align: center;
      padding: 20px
    }

    .empty-g {
      font-size: 28px;
      margin-bottom: 4px;
      color: var(--b2)
    }

    /* ── Spin ── */
    .spin {
      display: inline-block;
      width: 11px;
      height: 11px;
      border: 2px solid var(--b2);
      border-top-color: var(--a);
      border-radius: 50%;
      animation: sp .55s linear infinite;
      flex-shrink: 0
    }

    @keyframes sp {
      to {
        transform: rotate(360deg)
      }
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 16px;
      right: 16px;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 11px;
      display: none;
      z-index: 999;
      max-width: 300px;
      border: 1px solid
    }

    #toast.ok {
      background: #0a2018;
      border-color: var(--ok);
      color: var(--ok)
    }

    #toast.er {
      background: #200a10;
      border-color: var(--er);
      color: var(--er)
    }

    #toast.warn {
      background: #1a1008;
      border-color: var(--warn);
      color: var(--warn)
    }

    /* ── Info pill ── */
    .info-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--s3);
      border: 1px solid var(--b);
      color: var(--t3)
    }

    /* ── Slot ── */
    .slot {
      border: 1px solid var(--b);
      border-radius: 5px;
      padding: 8px;
      background: var(--s3);
      min-height: 38px
    }

    .slot-head {
      border-color: #2a4a6a
    }

    .slot-body {
      border-color: #3a2a6a
    }

    .slot-lib {
      border-color: #5c3a10
    }

    .slot-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 6px
    }

    .slot-label.h {
      color: var(--head-c)
    }

    .slot-label.b {
      color: var(--body-c)
    }

    .slot-label.l {
      color: var(--lib-c)
    }

    /* ── Toggle ── */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .toggle-row input[type=checkbox] {
      width: auto;
      padding: 0
    }

    /* ── Script tag preview ── */
    .script-preview {
      background: var(--s3);
      border: 1px solid var(--b);
      border-radius: 5px;
      padding: 8px 10px;
      font-size: 10px;
      color: var(--t2);
      line-height: 1.8;
      white-space: pre;
      overflow-x: auto
    }

    .script-preview .sc-head {
      color: var(--head-c)
    }

    .script-preview .sc-body {
      color: var(--body-c)
    }

    .script-preview .sc-comment {
      color: var(--t3)
    }
  </style>
  <script src="https://storeserver-b5z7.onrender.com/bundle?needs=socket.io.min"></script>

</head>

<body>

  <!-- Header -->
  <div class="hdr">
    <span class="hdr-logo">⬡ Bundle Tester</span>
    <span class="hdr-sep"></span>
    <div class="dot" id="dot"></div>
    <span id="status-lbl">sin conectar</span>
  </div>

  <!-- Connection bar -->
  <div class="conn">
    <label>Servidor</label>
    <input id="srv" type="text" value="https://storeserver-b5z7.onrender.com" style="width:260px" />
    <label style="margin-left:6px">API Key</label>
    <input id="apikey" type="password" value="mi_clave_privadas" placeholder="x-api-key" style="width:160px" />
    <button id="connect-btn" class="btn btn-p btn-sm" onclick="connect()">Conectar</button>
    <span class="hdr-sep"></span>
    <button class="btn btn-g btn-sm" onclick="invalidate()">↺ Invalidar cache</button>
  </div>

  <!-- Layout -->
  <div class="layout">

    <!-- Sidebar -->
    <div class="side">
      <div class="side-tabs">
        <div class="side-tab active" id="stab-mods" onclick="sideTab('mods')">Módulos</div>
        <div class="side-tab" id="stab-pages" onclick="sideTab('pages')">Páginas</div>
        <div class="side-tab lib-tab" id="stab-libs" onclick="sideTab('libs')">LibMods</div>
      </div>
      <div class="side-search">
        <input id="side-search" placeholder="Buscar…" oninput="filterSide()" />
      </div>
      <div class="side-list" id="side-list">
        <div class="empty"><span class="empty-g">{ }</span>
          <p>Conecta para ver datos</p>
        </div>
      </div>
      <div class="side-footer">
        <button class="btn btn-p btn-sm" style="flex:1" onclick="newItem()">+ Nuevo</button>
        <button class="btn btn-g btn-sm" onclick="connect()">↻</button>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="main-tabs">
        <div class="main-tab active" id="mtab-editor" onclick="mainTab('editor')">Editor</div>
        <div class="main-tab" id="mtab-tester" onclick="mainTab('tester')">Tester</div>
        <div class="main-tab" id="mtab-url" onclick="mainTab('url')">Constructor URL</div>
      </div>

      <!-- Panel: Editor -->
      <div class="panel active" id="panel-editor">
        <div class="empty" id="editor-empty">
          <span class="empty-g">⬡</span>
          <p>Selecciona un módulo, página o LibMod para editar<br>o crea uno nuevo con + Nuevo</p>
        </div>
        <div id="editor-content" style="display:none;max-width:680px"></div>
      </div>

      <!-- Panel: Tester -->
      <div class="panel" id="panel-tester">
        <div class="sec">
          <div class="sec-label">Modo de prueba</div>
          <div class="row" style="margin-bottom:10px">
            <button class="btn btn-g btn-sm" onclick="setTesterMode('needs')" id="tmode-needs">?needs=</button>
            <button class="btn btn-g btn-sm" onclick="setTesterMode('page')" id="tmode-page">?page=</button>
            <button class="btn btn-g btn-sm" onclick="setTesterMode('lib')" id="tmode-lib">?libmod=</button>
            <button class="btn btn-g btn-sm" onclick="setTesterMode('combo')" id="tmode-combo">Combinado</button>
          </div>

          <div id="tester-needs-row" class="fg" style="margin-bottom:10px">
            <label>Módulos (?needs=)</label>
            <div class="row">
              <input id="t-needs" style="flex:1" placeholder="arqueomain,screenSmart" oninput="buildTestUrl()" />
              <button class="btn btn-g btn-sm" onclick="clearNeeds()">✕</button>
            </div>
            <div class="tags" id="t-mod-tags" style="margin-top:6px"></div>
          </div>

          <div id="tester-page-row" class="fg" style="margin-bottom:10px;display:none">
            <label>Página (?page=)</label>
            <div class="row">
              <select id="t-page" onchange="buildTestUrl()" style="flex:1">
                <option value="">— seleccionar página —</option>
              </select>
              <label class="toggle-row" style="white-space:nowrap">
                <input type="checkbox" id="t-header" onchange="buildTestUrl()" /> solo head
              </label>
            </div>
          </div>

          <div id="tester-lib-row" class="fg" style="margin-bottom:10px;display:none">
            <label>LibraryModule (?libmod=)</label>
            <div class="row">
              <select id="t-lib" onchange="buildTestUrl()" style="flex:1">
                <option value="">— seleccionar libmod —</option>
              </select>
              <label class="toggle-row" style="white-space:nowrap">
                <input type="checkbox" id="t-lib-header" onchange="buildTestUrl()" /> solo head
              </label>
            </div>
            <div class="tags" id="t-lib-tags" style="margin-top:6px"></div>
          </div>

          <div id="tester-extra-row" class="fg" style="margin-bottom:10px;display:none">
            <label>Módulos extra (?needs= adicionales)</label>
            <input id="t-extra" placeholder="listenermodal,nexus-frame-sdk" oninput="buildTestUrl()" />
          </div>
        </div>

        <div class="sec">
          <div class="url-box" id="t-url" onclick="copyUrl()">—</div>
          <div class="row" style="margin-top:8px">
            <button class="btn btn-p" id="btn-run" onclick="runTest()">▷ Generar</button>
            <button class="btn btn-g" onclick="openTab()">↗ Pestaña</button>
            <button class="btn btn-g" onclick="injectScript()">⬡ Inyectar</button>
            <label class="toggle-row" style="margin-left:auto;font-size:10px;color:var(--t3)">
              <input type="checkbox" id="t-nocache" onchange="buildTestUrl()" /> nocache
            </label>
            <div class="spin" id="t-spin" style="display:none"></div>
          </div>
        </div>

        <div class="chips" id="t-chips" style="display:none"></div>
        <div class="out" id="t-out">Resultado aquí…</div>
      </div>

      <!-- Panel: URL Builder -->
      <div class="panel" id="panel-url">
        <div class="sec">
          <div class="sec-label">Construye tu URL de bundle</div>
          <div class="grid2" style="margin-bottom:10px">
            <div class="fg">
              <label>Página (opcional)</label>
              <select id="u-page" onchange="buildUrlPanel()">
                <option value="">— sin página —</option>
              </select>
            </div>
            <div class="fg">
              <label>LibraryModule (opcional)</label>
              <select id="u-lib" onchange="buildUrlPanel()">
                <option value="">— sin libmod —</option>
              </select>
            </div>
            <div class="fg">
              <label>Opciones</label>
              <div class="col" style="gap:4px;padding-top:4px">
                <label class="toggle-row"><input type="checkbox" id="u-header" onchange="buildUrlPanel()" />
                  &header=true</label>
                <label class="toggle-row"><input type="checkbox" id="u-nocache" onchange="buildUrlPanel()" />
                  &nocache=1</label>
              </div>
            </div>
            <div class="fg">
              <label>Módulos extra (?needs=) — click para agregar</label>
              <div class="tags" id="u-mod-tags" style="margin-bottom:6px"></div>
              <input id="u-needs" placeholder="o escribe directo…" oninput="buildUrlPanel()" />
            </div>
          </div>

          <div class="url-box" id="u-url" onclick="copyUrlPanel()">—</div>

          <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-p btn-sm" onclick="openUrlPanel()">↗ Abrir</button>
            <button class="btn btn-g btn-sm" onclick="copyUrlPanel()">⎘ Copiar</button>
            <button class="btn btn-g btn-sm" onclick="copyTag()">&#60;script&#62; tag</button>
          </div>

          <div class="divider"></div>
          <div class="sec-label">Preview resolución de módulos</div>
          <div id="u-preview" class="out" style="min-height:44px">—</div>
        </div>
      </div>

    </div><!-- /main -->
  </div><!-- /layout -->

  <div id="toast"></div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    let manifest = {};
    let pages = {};
    let libmods = {};      // ← NUEVO: library modules
    let sideMode = 'mods'; // 'mods' | 'pages' | 'libs'
    let activeKey = null;
    let activeType = null; // 'mod' | 'page' | 'lib'
    let isNew = false;
    let testerMode = 'needs';

    // ── Helpers ────────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const srv = () => $('srv').value.replace(/\/$/, '');
    const ak = () => $('apikey').value;
    const hdrs = () => ({ 'Content-Type': 'application/json', 'x-api-key': ak() });

    let toastT;
    function toast(msg, type = 'ok') {
      const el = $('toast');
      el.textContent = msg; el.className = type; el.style.display = 'block';
      clearTimeout(toastT); toastT = setTimeout(() => el.style.display = 'none', 3000);
    }

    function setDot(state, label) {
      $('dot').className = 'dot ' + state;
      $('status-lbl').textContent = label;
    }

    function setConnectState(state) {
      const btn = $('connect-btn');
      if (!btn) return;
      btn.disabled = false;
      switch (state) {
        case 'loading':
          btn.textContent = 'Conectando...'; btn.className = 'btn btn-sm';
          btn.style.background = '#f59e0b'; btn.style.color = '#fff'; break;
        case 'connected':
          btn.textContent = '● LIVE'; btn.className = 'btn btn-sm';
          btn.style.background = '#16a34a'; btn.style.color = '#fff'; break;
        case 'error':
          btn.textContent = '⚠ ERROR'; btn.className = 'btn btn-sm';
          btn.style.background = '#dc2626'; btn.style.color = '#fff'; break;
        default:
          btn.textContent = 'Conectar'; btn.className = 'btn btn-p btn-sm';
          btn.style.background = ''; btn.style.color = '';
      }
    }

    // ── Connect ────────────────────────────────────────────────────────────────
    async function connect() {
      setConnectState('loading');
      setDot('ld', 'conectando…');
      try {
        const res = await fetch(`${srv()}/bundle/list`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        manifest = {};
        (data.modules || []).forEach(m => { manifest[m.name] = m; });

        pages = {};
        (data.pages || []).forEach(p => { pages[p.name] = p; });

        libmods = {};
        (data.libmods || []).forEach(l => { libmods[l.name] = l; });

        setDot('ok', srv().replace('https://', ''));
        setConnectState('connected');
        renderSide();
        refreshTesterTags();
        refreshUrlTags();
        refreshPageSelects();
        refreshLibSelects();

        toast(`✓ ${Object.keys(manifest).length} módulos, ${Object.keys(pages).length} páginas, ${Object.keys(libmods).length} libmods`);
      } catch (e) {
        setDot('er', e.message);
        setConnectState('error');
        toast('Error: ' + e.message, 'er');
      }
    }

    // ── Sidebar tabs ───────────────────────────────────────────────────────────
    function sideTab(mode) {
      sideMode = mode;
      ['mods', 'pages', 'libs'].forEach(m => {
        $(`stab-${m}`).classList.toggle('active', m === mode);
      });
      $('side-search').value = '';
      renderSide();
    }

    function filterSide() { renderSide($('side-search').value.toLowerCase()); }

    function renderSide(q = '') {
      const list = $('side-list');
      if (sideMode === 'mods') {
        const keys = Object.keys(manifest).filter(k => !q || k.includes(q));
        if (!keys.length) {
          list.innerHTML = `<div class="empty" style="height:120px"><span class="empty-g">{ }</span><p>${q ? 'Sin resultados' : 'Sin módulos'}</p></div>`;
          return;
        }
        list.innerHTML = keys.map(k => {
          const m = manifest[k];
          const deps = m.deps || [];
          return `<div class="item ${activeKey === k && activeType === 'mod' ? 'active' : ''}" onclick="selectMod('${k}')">
            <span class="item-icon">js</span>
            <span class="item-name">${k}</span>
            ${deps.length ? `<span class="item-badge">${deps.length}d</span>` : ''}
          </div>`;
        }).join('');

      } else if (sideMode === 'pages') {
        const keys = Object.keys(pages).filter(k => !q || k.includes(q));
        if (!keys.length) {
          list.innerHTML = `<div class="empty" style="height:120px"><span class="empty-g">⬡</span><p>${q ? 'Sin resultados' : 'Sin páginas'}</p></div>`;
          return;
        }
        list.innerHTML = keys.map(k => {
          const p = pages[k];
          const h = (p.head || []).length;
          const b = (p.body_end || []).length;
          return `<div class="item ${activeKey === k && activeType === 'page' ? 'active' : ''}" onclick="selectPage('${k}')">
            <span class="item-icon">pg</span>
            <span class="item-name">${k}</span>
            <span class="item-badge head">${h}h</span>
            <span class="item-badge body">${b}b</span>
          </div>`;
        }).join('');

      } else {
        // libs
        const keys = Object.keys(libmods).filter(k => !q || k.includes(q));
        if (!keys.length) {
          list.innerHTML = `<div class="empty" style="height:120px"><span class="empty-g">◈</span><p>${q ? 'Sin resultados' : 'Sin LibraryModules'}</p></div>`;
          return;
        }
        list.innerHTML = keys.map(k => {
          const l = libmods[k];
          const hc = (l.head || []).length;
          const bc = (l.body_end || []).length;
          return `<div class="item ${activeKey === k && activeType === 'lib' ? 'active selected-lib' : ''}" onclick="selectLib('${k}')">
            <span class="item-icon" style="color:var(--lib-c)">◈</span>
            <span class="item-name">${k}</span>
            <span class="item-badge lib">${hc + bc}f</span>
          </div>`;
        }).join('');
      }
    }

    // ── New item ───────────────────────────────────────────────────────────────
    function newItem() {
      mainTab('editor');
      isNew = true; activeKey = null;
      if (sideMode === 'mods') renderModEditor(null, {});
      else if (sideMode === 'pages') renderPageEditor(null, {});
      else renderLibEditor(null, {});
    }

    // ── Select mod ─────────────────────────────────────────────────────────────
    function selectMod(name) {
      mainTab('editor');
      activeKey = name; activeType = 'mod'; isNew = false;
      renderSide($('side-search').value.toLowerCase());
      renderModEditor(name, manifest[name] || {});
    }

    function renderModEditor(name, mod) {
      $('editor-empty').style.display = 'none';
      const c = $('editor-content');
      c.style.display = 'block';
      const file = mod.file || (mod.githubPath ? mod.githubPath.split('/').pop() : '');
      const branch = mod.branch || '';
      const deps = mod.deps || [];
      const otherMods = Object.keys(manifest).filter(k => k !== name);

      c.innerHTML = `
        <div class="row" style="margin-bottom:14px;align-items:flex-start">
          <div style="flex:1">
            <div style="font-size:13px;color:${isNew ? 'var(--a)' : 'var(--t)'}">
              ${isNew ? '+ nuevo módulo' : name}
            </div>
            ${!isNew && mod.resolvedPath ? `<div class="info-pill" style="margin-top:4px">public/js_modules/${file}</div>` : ''}
          </div>
          ${!isNew ? `
            <button class="btn btn-ok btn-sm" onclick="testMod('${name}')">▷ Probar</button>
            <button class="btn btn-er btn-sm" onclick="deleteMod('${name}')">✕</button>
          ` : ''}
        </div>
        <div class="grid2">
          <div class="fg">
            <label>Nombre del módulo</label>
            <input id="e-name" value="${name || ''}" placeholder="ej: arqueomain"
                   ${!isNew ? 'readonly style="opacity:.5"' : ''}/>
          </div>
          <div class="fg">
            <label>Archivo .js</label>
            <input id="e-file" value="${file}" placeholder="arqueomain.js"/>
            <span class="hint">En public/js_modules/</span>
          </div>
          <div class="fg">
            <label>Branch (vacío = main)</label>
            <input id="e-branch" value="${branch}" placeholder="main"/>
          </div>
          <div class="fg" style="justify-content:flex-end">
            <button class="btn btn-g btn-sm" onclick="previewMod()">↗ Ver raw en bundle</button>
          </div>
          <div class="fg full">
            <label>Dependencias</label>
            <div class="tags" id="e-deps" style="padding:6px;background:var(--s3);border:1px solid var(--b);border-radius:5px;min-height:34px">
              ${deps.map(d => depTag(d)).join('')}
            </div>
            <div class="row" style="margin-top:5px">
              <select id="e-dep-sel" style="flex:1">
                <option value="">— agregar dep —</option>
                ${otherMods.map(k => `<option value="${k}">${k}</option>`).join('')}
              </select>
              <button class="btn btn-g btn-sm" onclick="addDep()">+</button>
            </div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="row">
          <button class="btn btn-p" onclick="saveMod()">${isNew ? '+ Crear' : '↑ Guardar'}</button>
          <button class="btn btn-g" onclick="cancelEdit()">Cancelar</button>
        </div>`;
    }

    function depTag(d) {
      return `<span class="tag tag-mod" data-dep="${d}">${d} <button class="tag-rem" onclick="removeDep('${d}')">×</button></span>`;
    }
    function addDep() {
      const sel = $('e-dep-sel'); const v = sel.value; if (!v) return;
      const c = $('e-deps');
      if (c.querySelector(`[data-dep="${v}"]`)) return;
      c.insertAdjacentHTML('beforeend', depTag(v)); sel.value = '';
    }
    function removeDep(d) { document.querySelector(`.tag[data-dep="${d}"]`)?.remove(); }
    function getDeps() { return [...document.querySelectorAll('#e-deps [data-dep]')].map(el => el.dataset.dep); }

    async function saveMod() {
      const name = $('e-name')?.value?.trim();
      const file = $('e-file')?.value?.trim();
      const branch = $('e-branch')?.value?.trim();
      const deps = getDeps();
      if (!name) return toast('Nombre requerido', 'er');
      if (!file) return toast('Archivo requerido', 'er');
      const entry = { githubPath: `public/js_modules/${file}`, ...(branch ? { branch } : {}), ...(deps.length ? { deps } : {}) };
      try {
        const res = await fetch(`${srv()}/api/bundle/manifest`, {
          method: 'PATCH', headers: hdrs(), body: JSON.stringify({ [name]: entry })
        });
        const d = await res.json();
        if (!d.ok) throw new Error(d.error);
        manifest[name] = { name, file, resolvedPath: `public/js_modules/${file}`, branch, deps };
        activeKey = name; activeType = 'mod'; isNew = false;
        toast(`✓ ${name} guardado`);
        renderSide(); selectMod(name);
        refreshTesterTags(); refreshUrlTags();
      } catch (e) { toast(e.message, 'er'); }
    }

    async function deleteMod(name) {
      if (!confirm(`¿Eliminar módulo "${name}"?`)) return;
      try {
        const res = await fetch(`${srv()}/api/bundle/manifest/${name}`, { method: 'DELETE', headers: hdrs() });
        const d = await res.json();
        if (!d.ok) throw new Error(d.error);
        delete manifest[name];
        toast(`✓ ${name} eliminado`, 'warn');
        activeKey = null; activeType = null;
        renderSide(); clearEditor(); refreshTesterTags(); refreshUrlTags();
      } catch (e) { toast(e.message, 'er'); }
    }

    function previewMod() {
      const name = $('e-name')?.value?.trim();
      if (!name) return toast('Guarda primero', 'warn');
      window.open(`${srv()}/bundle?needs=${name}&nocache=1`, '_blank');
    }

    function testMod(name) {
      mainTab('tester'); setTesterMode('needs');
      $('t-needs').value = name; buildTestUrl();
    }

    // ── Select page ────────────────────────────────────────────────────────────
    function selectPage(name) {
      mainTab('editor');
      activeKey = name; activeType = 'page'; isNew = false;
      renderSide($('side-search').value.toLowerCase());
      renderPageEditor(name, pages[name] || {});
    }

    function renderPageEditor(name, cfg) {
      $('editor-empty').style.display = 'none';
      const c = $('editor-content');
      c.style.display = 'block';
      const head = cfg.head || [];
      const bodyEnd = cfg.body_end || [];
      const desc = cfg.description || '';

      c.innerHTML = `
        <div class="row" style="margin-bottom:14px">
          <div style="flex:1;font-size:13px;color:${isNew ? 'var(--a)' : 'var(--t)'}">
            ${isNew ? '+ nueva página' : name}
          </div>
          ${!isNew ? `
            <button class="btn btn-ok btn-sm" onclick="testPage('${name}')">▷ Probar</button>
            <button class="btn btn-er btn-sm" onclick="deletePage('${name}')">✕</button>
          ` : ''}
        </div>
        <div class="grid2">
          <div class="fg">
            <label>Nombre de página</label>
            <input id="p-name" value="${name || ''}" placeholder="ej: dabeiba"
                   ${!isNew ? 'readonly style="opacity:.5"' : ''}/>
          </div>
          <div class="fg">
            <label>Descripción</label>
            <input id="p-desc" value="${desc}" placeholder="Publicación arqueológica…"/>
          </div>
          <div class="fg full">
            <label style="color:var(--head-c)">▸ head — se cargan primero</label>
            <div class="slot slot-head" id="p-head-slot">
              ${head.map((m, i) => sortItem(m, i, 'head')).join('')}
              ${!head.length ? '<span style="font-size:10px;color:var(--t3)">Sin módulos</span>' : ''}
            </div>
            <div class="row" style="margin-top:5px">
              <select id="p-head-sel" style="flex:1">
                <option value="">— agregar a head —</option>
                ${Object.keys(manifest).map(k => `<option value="${k}">${k}</option>`).join('')}
              </select>
              <button class="btn btn-head btn-sm" onclick="addToSlot('head')">+</button>
            </div>
          </div>
          <div class="fg full">
            <label style="color:var(--body-c)">▸ body_end — al final del body</label>
            <div class="slot slot-body" id="p-body-slot">
              ${bodyEnd.map((m, i) => sortItem(m, i, 'body')).join('')}
              ${!bodyEnd.length ? '<span style="font-size:10px;color:var(--t3)">Sin módulos</span>' : ''}
            </div>
            <div class="row" style="margin-top:5px">
              <select id="p-body-sel" style="flex:1">
                <option value="">— agregar a body_end —</option>
                ${Object.keys(manifest).map(k => `<option value="${k}">${k}</option>`).join('')}
              </select>
              <button class="btn btn-body btn-sm" onclick="addToSlot('body')">+</button>
            </div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="row">
          <button class="btn btn-p" onclick="savePage()">${isNew ? '+ Crear página' : '↑ Guardar'}</button>
          <button class="btn btn-g" onclick="cancelEdit()">Cancelar</button>
        </div>`;
      initDragDrop('p-head-slot');
      initDragDrop('p-body-slot');
    }

    function sortItem(mod, idx, slot) {
      return `<div class="sort-item" draggable="true" data-mod="${mod}" data-slot="${slot}">
        <span class="sort-handle">⠿</span>
        <span class="sort-idx">${idx + 1}</span>
        <span style="flex:1;font-size:11px">${mod}</span>
        <button class="btn btn-xs btn-g" onclick="removeFromSlot('${slot}','${mod}')">✕</button>
      </div>`;
    }

    function addToSlot(slot) {
      const sel = $(slot === 'head' ? 'p-head-sel' : 'p-body-sel');
      const val = sel.value; if (!val) return;
      const container = $(slot === 'head' ? 'p-head-slot' : 'p-body-slot');
      if (container.querySelector(`[data-mod="${val}"]`)) return toast('Ya está en ese slot', 'warn');
      container.querySelectorAll('span').forEach(s => { if (s.textContent.includes('Sin')) s.remove(); });
      const items = container.querySelectorAll('.sort-item');
      container.insertAdjacentHTML('beforeend', sortItem(val, items.length, slot));
      sel.value = ''; reindexSlot(slot);
    }

    function removeFromSlot(slot, mod) {
      const container = $(slot === 'head' ? 'p-head-slot' : 'p-body-slot');
      container.querySelector(`[data-mod="${mod}"]`)?.remove();
      reindexSlot(slot);
    }

    function reindexSlot(slot) {
      const container = $(slot === 'head' ? 'p-head-slot' : 'p-body-slot');
      container.querySelectorAll('.sort-item').forEach((el, i) => {
        el.querySelector('.sort-idx').textContent = i + 1;
      });
    }

    function getSlotMods(slot) {
      const container = $(slot === 'head' ? 'p-head-slot' : 'p-body-slot');
      return [...container.querySelectorAll('.sort-item')].map(el => el.dataset.mod);
    }

    function initDragDrop(containerId) {
      const c = $(containerId); if (!c) return;
      let dragging = null;
      c.addEventListener('dragstart', e => {
        dragging = e.target.closest('.sort-item');
        if (dragging) dragging.style.opacity = '.4';
      });
      c.addEventListener('dragend', () => {
        if (dragging) { dragging.style.opacity = ''; dragging = null; }
      });
      c.addEventListener('dragover', e => {
        e.preventDefault();
        const over = e.target.closest('.sort-item');
        if (over && over !== dragging) {
          const rect = over.getBoundingClientRect();
          const after = e.clientY > rect.top + rect.height / 2;
          c.insertBefore(dragging, after ? over.nextSibling : over);
        }
      });
      c.addEventListener('drop', () => {
        const slot = containerId.includes('head') ? 'head' : 'body';
        reindexSlot(slot);
      });
    }

    async function savePage() {
      const name = $('p-name')?.value?.trim();
      const desc = $('p-desc')?.value?.trim();
      const head = getSlotMods('head');
      const bodyEnd = getSlotMods('body');
      if (!name) return toast('Nombre requerido', 'er');
      const entry = { description: desc, head, body_end: bodyEnd };
      try {
        const res = await fetch(`${srv()}/api/bundle/pages`, {
          method: 'PATCH', headers: hdrs(), body: JSON.stringify({ [name]: entry })
        });
        const d = await res.json();
        if (!d.ok) throw new Error(d.error);
        pages[name] = { name, ...entry };
        activeKey = name; activeType = 'page'; isNew = false;
        toast(`✓ ${name} guardado`);
        renderSide(); selectPage(name); refreshPageSelects();
      } catch (e) { toast(e.message, 'er'); }
    }

    async function deletePage(name) {
      if (!confirm(`¿Eliminar página "${name}"?`)) return;
      try {
        const res = await fetch(`${srv()}/api/bundle/pages/${name}`, { method: 'DELETE', headers: hdrs() });
        const d = await res.json();
        if (!d.ok) throw new Error(d.error);
        delete pages[name];
        toast(`✓ ${name} eliminado`, 'warn');
        activeKey = null; activeType = null;
        renderSide(); clearEditor(); refreshPageSelects();
      } catch (e) { toast(e.message, 'er'); }
    }

    function testPage(name) {
      mainTab('tester'); setTesterMode('page');
      $('t-page').value = name; buildTestUrl();
    }

    // ══════════════════════════════════════════════════════════════════
    // LIBRARY MODULE EDITOR
    // ══════════════════════════════════════════════════════════════════

    function selectLib(name) {
      mainTab('editor');
      activeKey = name; activeType = 'lib'; isNew = false;
      renderSide($('side-search').value.toLowerCase());
      renderLibEditor(name, libmods[name] || {});
    }

    /*
      LibraryModule schema:
      {
        description: string,
        basePath: string,          // ej: "public/avatarStudio" o "js"
        branch: string,            // opcional, default main
        head: [                    // archivos que van en <head>
          { file: "constantes.js", label: "Constantes" },
          ...
        ],
        body_end: [                // archivos que van al final del body
          { file: "manager.js", label: "Manager" },
          ...
        ]
      }
    */

    function renderLibEditor(name, cfg) {
      $('editor-empty').style.display = 'none';
      const c = $('editor-content');
      c.style.display = 'block';

      const head = cfg.head || [];
      const bodyEnd = cfg.body_end || [];
      const desc = cfg.description || '';
      const basePath = cfg.basePath || '';
      const branch = cfg.branch || '';

      c.innerHTML = `
        <div class="row" style="margin-bottom:14px;align-items:flex-start">
          <div style="flex:1">
            <div style="font-size:13px;color:${isNew ? 'var(--lib-c)' : 'var(--t)'}">
              ${isNew ? '◈ nuevo LibraryModule' : `◈ ${name}`}
            </div>
            ${!isNew ? `<div class="info-pill" style="margin-top:4px;border-color:#5c3a10;color:var(--lib-c)">${basePath || '/'}</div>` : ''}
          </div>
          ${!isNew ? `
            <button class="btn btn-ok btn-sm" onclick="testLib('${name}')">▷ Probar</button>
            <button class="btn btn-er btn-sm" onclick="deleteLib('${name}')">✕</button>
          ` : ''}
        </div>

        <div class="grid2">
          <div class="fg">
            <label>Nombre del LibraryModule</label>
            <input id="l-name" value="${name || ''}" placeholder="ej: avatarStudio"
                   ${!isNew ? 'readonly style="opacity:.5"' : ''}/>
          </div>
          <div class="fg">
            <label>Descripción</label>
            <input id="l-desc" value="${desc}" placeholder="Editor de avatares 3D…"/>
          </div>
          <div class="fg">
            <label>Base path en repo</label>
            <input id="l-basepath" value="${basePath}" placeholder="public/avatarStudio"/>
            <span class="hint">Prefijo para todos los archivos del libmod</span>
          </div>
          <div class="fg">
            <label>Branch (vacío = main)</label>
            <input id="l-branch" value="${branch}" placeholder="main"/>
          </div>
        </div>

        <div class="divider"></div>

        <!-- HEAD files -->
        <div class="fg" style="margin-bottom:12px">
          <div class="slot-label h">▸ Archivos HEAD — se cargan en &lt;head&gt;</div>
          <div class="slot slot-lib" id="l-head-slot" style="min-height:42px">
            ${head.map((f, i) => libFileRow(f, i, 'head')).join('')}
            ${!head.length ? '<span style="font-size:10px;color:var(--t3)">Sin archivos</span>' : ''}
          </div>
          <div class="row" style="margin-top:6px;gap:5px">
            <input id="l-head-file" placeholder="constantes.js" style="flex:1" />
            <input id="l-head-label" placeholder="Label opcional" style="width:130px"/>
            <button class="btn btn-head btn-sm" onclick="addLibFile('head')">+ head</button>
          </div>
        </div>

        <!-- BODY_END files -->
        <div class="fg" style="margin-bottom:12px">
          <div class="slot-label b">▸ Archivos BODY END — al final del &lt;body&gt;</div>
          <div class="slot slot-lib" id="l-body-slot" style="min-height:42px">
            ${bodyEnd.map((f, i) => libFileRow(f, i, 'body_end')).join('')}
            ${!bodyEnd.length ? '<span style="font-size:10px;color:var(--t3)">Sin archivos</span>' : ''}
          </div>
          <div class="row" style="margin-top:6px;gap:5px">
            <input id="l-body-file" placeholder="manager.js" style="flex:1" />
            <input id="l-body-label" placeholder="Label opcional" style="width:130px"/>
            <button class="btn btn-body btn-sm" onclick="addLibFile('body_end')">+ body</button>
          </div>
        </div>

        <!-- Preview de script tags -->
        <div class="fg" style="margin-bottom:12px">
          <div class="slot-label l">◈ Preview de &lt;script&gt; tags generados</div>
          <div class="script-preview" id="l-preview">—</div>
        </div>

        <div class="divider"></div>
        <div class="row">
          <button class="btn btn-lib" onclick="saveLib()">${isNew ? '◈ Crear LibMod' : '↑ Guardar'}</button>
          <button class="btn btn-g" onclick="cancelEdit()">Cancelar</button>
        </div>`;

      initLibDragDrop('l-head-slot', 'head');
      initLibDragDrop('l-body-slot', 'body_end');
      updateLibPreview();

      // bind inputs to live-update preview
      ['l-basepath', 'l-head-slot', 'l-body-slot'].forEach(id => {
        const el = $(id);
        if (el) el.addEventListener('input', updateLibPreview);
      });
    }

    function libFileRow(f, idx, slot) {
      const file = typeof f === 'string' ? f : f.file;
      const label = typeof f === 'string' ? '' : (f.label || '');
      const slotShort = slot === 'head' ? 'head' : 'body';
      return `<div class="file-row" draggable="true" data-file="${file}" data-label="${label}" data-slot="${slot}">
        <span class="sort-handle">⠿</span>
        <span class="sort-idx" style="color:var(--t3);font-size:9px;width:14px;text-align:right">${idx + 1}</span>
        <span class="file-path">${file}${label ? ` <span style="color:var(--t3)">— ${label}</span>` : ''}</span>
        <span class="file-slot-badge ${slotShort}">${slotShort}</span>
        <button class="btn btn-xs btn-g" onclick="removeLibFile('${slot}','${file}')">✕</button>
      </div>`;
    }

    function addLibFile(slot) {
      const fileEl = slot === 'head' ? $('l-head-file') : $('l-body-file');
      const labelEl = slot === 'head' ? $('l-head-label') : $('l-body-label');
      const file = fileEl.value.trim();
      if (!file) return toast('Nombre de archivo requerido', 'warn');

      const containerId = slot === 'head' ? 'l-head-slot' : 'l-body-slot';
      const container = $(containerId);
      if (container.querySelector(`[data-file="${file}"][data-slot="${slot}"]`))
        return toast('Archivo ya existe en este slot', 'warn');

      container.querySelectorAll('span').forEach(s => { if (s.textContent.includes('Sin')) s.remove(); });
      const items = container.querySelectorAll('.file-row');
      container.insertAdjacentHTML('beforeend', libFileRow(
        { file, label: labelEl.value.trim() }, items.length, slot
      ));
      fileEl.value = ''; labelEl.value = '';
      reindexLibSlot(containerId);
      updateLibPreview();
    }

    function removeLibFile(slot, file) {
      const containerId = slot === 'head' ? 'l-head-slot' : 'l-body-slot';
      const container = $(containerId);
      container.querySelector(`[data-file="${file}"][data-slot="${slot}"]`)?.remove();
      reindexLibSlot(containerId);
      updateLibPreview();
    }

    function reindexLibSlot(containerId) {
      $(containerId).querySelectorAll('.file-row').forEach((el, i) => {
        el.querySelector('.sort-idx').textContent = i + 1;
      });
    }

    function getLibFiles(slot) {
      const containerId = slot === 'head' ? 'l-head-slot' : 'l-body-slot';
      return [...$(containerId).querySelectorAll('.file-row')].map(el => ({
        file: el.dataset.file,
        ...(el.dataset.label ? { label: el.dataset.label } : {}),
      }));
    }

    function initLibDragDrop(containerId, slot) {
      const c = $(containerId); if (!c) return;
      let dragging = null;
      c.addEventListener('dragstart', e => {
        dragging = e.target.closest('.file-row');
        if (dragging) dragging.style.opacity = '.4';
      });
      c.addEventListener('dragend', () => {
        if (dragging) { dragging.style.opacity = ''; dragging = null; }
        reindexLibSlot(containerId);
        updateLibPreview();
      });
      c.addEventListener('dragover', e => {
        e.preventDefault();
        const over = e.target.closest('.file-row');
        if (over && over !== dragging) {
          const rect = over.getBoundingClientRect();
          const after = e.clientY > rect.top + rect.height / 2;
          c.insertBefore(dragging, after ? over.nextSibling : over);
        }
      });
    }

    function updateLibPreview() {
      const pre = $('l-preview'); if (!pre) return;
      const basePath = ($('l-basepath')?.value || '').replace(/\/$/, '');
      const headFiles = getLibFiles('head');
      const bodyFiles = getLibFiles('body_end');

      const lines = [];
      if (headFiles.length) {
        lines.push(`<span class="sc-comment">/* ── HEAD ── */</span>`);
        headFiles.forEach(f => {
          const src = basePath ? `${basePath}/${f.file}` : f.file;
          lines.push(`<span class="sc-head">&lt;script src="${src}"&gt;&lt;/script&gt;</span>${f.label ? ` <span class="sc-comment">// ${f.label}</span>` : ''}`);
        });
      }
      if (bodyFiles.length) {
        if (lines.length) lines.push('');
        lines.push(`<span class="sc-comment">/* ── BODY END ── */</span>`);
        bodyFiles.forEach(f => {
          const src = basePath ? `${basePath}/${f.file}` : f.file;
          lines.push(`<span class="sc-body">&lt;script src="${src}"&gt;&lt;/script&gt;</span>${f.label ? ` <span class="sc-comment">// ${f.label}</span>` : ''}`);
        });
      }
      pre.innerHTML = lines.length ? lines.join('\n') : '—';
    }

    async function saveLib() {
      const name = $('l-name')?.value?.trim();
      const desc = $('l-desc')?.value?.trim();
      const basePath = $('l-basepath')?.value?.trim();
      const branch = $('l-branch')?.value?.trim();
      const head = getLibFiles('head');
      const bodyEnd = getLibFiles('body_end');
      if (!name) return toast('Nombre requerido', 'er');
      if (!head.length && !bodyEnd.length) return toast('Agrega al menos un archivo', 'warn');

      const entry = {
        description: desc,
        basePath,
        ...(branch ? { branch } : {}),
        head,
        body_end: bodyEnd,
      };

      try {
        const res = await fetch(`${srv()}/api/bundle/libmods`, {
          method: 'PATCH', headers: hdrs(), body: JSON.stringify({ [name]: entry })
        });
        const d = await res.json();
        if (!d.ok) throw new Error(d.error);
        libmods[name] = { name, ...entry };
        activeKey = name; activeType = 'lib'; isNew = false;
        toast(`✓ LibMod "${name}" guardado`);
        renderSide(); selectLib(name); refreshLibSelects();
      } catch (e) { toast(e.message, 'er'); }
    }

    async function deleteLib(name) {
      if (!confirm(`¿Eliminar LibraryModule "${name}"?`)) return;
      try {
        const res = await fetch(`${srv()}/api/bundle/libmods/${name}`, { method: 'DELETE', headers: hdrs() });
        const d = await res.json();
        if (!d.ok) throw new Error(d.error);
        delete libmods[name];
        toast(`✓ ${name} eliminado`, 'warn');
        activeKey = null; activeType = null;
        renderSide(); clearEditor(); refreshLibSelects();
      } catch (e) { toast(e.message, 'er'); }
    }

    function testLib(name) {
      mainTab('tester'); setTesterMode('lib');
      $('t-lib').value = name; buildTestUrl();
    }

    // ── Editor utils ───────────────────────────────────────────────────────────
    function clearEditor() {
      $('editor-empty').style.display = 'flex';
      $('editor-content').style.display = 'none';
    }

    function cancelEdit() {
      isNew = false;
      if (activeKey && activeType === 'mod') selectMod(activeKey);
      else if (activeKey && activeType === 'page') selectPage(activeKey);
      else if (activeKey && activeType === 'lib') selectLib(activeKey);
      else clearEditor();
    }

    // ── Main tabs ──────────────────────────────────────────────────────────────
    function mainTab(t) {
      ['editor', 'tester', 'url'].forEach(id => {
        $(`mtab-${id}`).classList.toggle('active', id === t);
        $(`panel-${id}`).classList.toggle('active', id === t);
      });
    }

    // ── Tester mode ────────────────────────────────────────────────────────────
    function setTesterMode(mode) {
      testerMode = mode;
      ['needs', 'page', 'lib', 'combo'].forEach(m => {
        $(`tmode-${m}`).className = 'btn btn-sm ' + (m === mode ? 'btn-p' : 'btn-g');
      });
      $('tester-needs-row').style.display = (mode === 'needs' || mode === 'combo') ? 'flex' : 'none';
      $('tester-needs-row').style.flexDirection = 'column';
      $('tester-page-row').style.display = (mode === 'page' || mode === 'combo') ? 'flex' : 'none';
      $('tester-page-row').style.flexDirection = 'column';
      $('tester-lib-row').style.display = (mode === 'lib' || mode === 'combo') ? 'flex' : 'none';
      $('tester-lib-row').style.flexDirection = 'column';
      $('tester-extra-row').style.display = mode === 'combo' ? 'flex' : 'none';
      $('tester-extra-row').style.flexDirection = 'column';
      buildTestUrl();
    }

    function refreshTesterTags() {
      const c = $('t-mod-tags'); if (!c) return;
      c.innerHTML = Object.keys(manifest).map(k =>
        `<span class="tag tag-mod" onclick="addNeedsTag('${k}')">${k}</span>`
      ).join('');
    }

    function addNeedsTag(name) {
      const el = $('t-needs');
      const cur = el.value.split(',').map(s => s.trim()).filter(Boolean);
      if (!cur.includes(name)) cur.push(name);
      el.value = cur.join(',');
      buildTestUrl();
    }

    function clearNeeds() { $('t-needs').value = ''; buildTestUrl(); }

    function refreshPageSelects() {
      const opts = '<option value="">— seleccionar —</option>' +
        Object.keys(pages).map(k => `<option value="${k}">${k}</option>`).join('');
      ['t-page', 'u-page'].forEach(id => { const el = $(id); if (el) el.innerHTML = opts; });
    }

    function refreshLibSelects() {
      const opts = '<option value="">— seleccionar —</option>' +
        Object.keys(libmods).map(k => `<option value="${k}">${k}</option>`).join('');
      ['t-lib', 'u-lib'].forEach(id => { const el = $(id); if (el) el.innerHTML = opts; });

      const c = $('t-lib-tags'); if (!c) return;
      c.innerHTML = Object.keys(libmods).map(k =>
        `<span class="tag tag-lib" onclick="selectLibTag('${k}')">◈ ${k}</span>`
      ).join('');
    }

    function selectLibTag(name) {
      $('t-lib').value = name; buildTestUrl();
    }

    function buildTestUrl() {
      const mode = testerMode;
      const nc = $('t-nocache').checked ? '&nocache=1' : '';
      let url = srv() + '/bundle?';
      const parts = [];

      if (mode === 'needs') {
        const n = $('t-needs').value.trim();
        if (n) parts.push('needs=' + n);
      } else if (mode === 'page') {
        const p = $('t-page').value;
        if (p) parts.push('page=' + p);
        if ($('t-header').checked) parts.push('header=true');
      } else if (mode === 'lib') {
        const l = $('t-lib').value;
        if (l) parts.push('libmod=' + l);
        if ($('t-lib-header').checked) parts.push('header=true');
      } else {
        // combo
        const p = $('t-page').value;
        const l = $('t-lib').value;
        const n = $('t-needs').value.trim();
        const x = $('t-extra').value.trim();
        if (p) parts.push('page=' + p);
        if (l) parts.push('libmod=' + l);
        if (n) parts.push('needs=' + n);
        if (x) parts.push('needs=' + x);
        if ($('t-header').checked) parts.push('header=true');
      }

      if (!parts.length) { $('t-url').textContent = '—'; return; }
      url += parts.join('&') + nc;
      $('t-url').innerHTML = colorizeUrl(url);
    }

    function colorizeUrl(url) {
      return url
        .replace(/(page=[^&]+)/g, '<span class="param-page">$1</span>')
        .replace(/(libmod=[^&]+)/g, '<span class="param-lib">$1</span>')
        .replace(/(header=true)/g, '<span class="param-head">$1</span>')
        .replace(/(needs=[^&]+)/g, '<span class="param-needs">$1</span>')
        .replace(/(nocache=1)/g, '<span style="color:var(--warn)">$1</span>');
    }

    async function runTest() {
      const urlEl = $('t-url');
      const rawUrl = urlEl.textContent || urlEl.innerText;
      if (!rawUrl || rawUrl === '—') return toast('Construye una URL primero', 'warn');

      const out = $('t-out'), chips = $('t-chips'), sp = $('t-spin'), btn = $('btn-run');
      out.className = 'out'; out.textContent = 'Cargando…';
      chips.style.display = 'none'; sp.style.display = 'block'; btn.disabled = true;

      try {
        const t0 = Date.now();
        const res = await fetch(rawUrl);
        const ms = Date.now() - t0;
        const cache = res.headers.get('X-Bundle-Cache') || '?';
        const headM = res.headers.get('X-Bundle-Head') || '';
        const bodyM = res.headers.get('X-Bundle-Body-End') || '';
        const libH = res.headers.get('X-Bundle-LibMod-Head') || '';
        const libB = res.headers.get('X-Bundle-LibMod-Body') || '';

        if (!res.ok) {
          let msg = 'HTTP ' + res.status;
          try { const j = await res.json(); msg = j.error || msg; } catch (e) { }
          out.className = 'out er'; out.textContent = '✗ ' + msg; return;
        }

        const text = await res.text();
        const kb = (text.length / 1024).toFixed(2);
        const lines = text.split('\n').length;

        chips.style.display = 'flex';
        chips.innerHTML = `
          <span class="chip ok">${ms} ms</span>
          <span class="chip ok">${kb} KB</span>
          <span class="chip ok">${lines} líneas</span>
          <span class="chip ${cache === 'HIT' ? 'hit' : 'mis'}">cache: ${cache}</span>
          ${headM ? `<span class="chip" style="color:var(--head-c);border-color:#2a4a6a">head: ${headM}</span>` : ''}
          ${bodyM ? `<span class="chip" style="color:var(--body-c);border-color:#3a2a6a">body: ${bodyM}</span>` : ''}
          ${libH ? `<span class="chip" style="color:var(--lib-c);border-color:#5c3a10">libH: ${libH}</span>` : ''}
          ${libB ? `<span class="chip" style="color:var(--lib-c);border-color:#5c3a10">libB: ${libB}</span>` : ''}`;

        out.className = 'out ok';
        out.textContent = text.slice(0, 1400) + (text.length > 1400 ? `\n\n…(${text.length} chars total)` : '');
      } catch (e) {
        out.className = 'out er'; out.textContent = '✗ ' + e.message;
      } finally {
        sp.style.display = 'none'; btn.disabled = false;
      }
    }

    function openTab() {
      const url = ($('t-url').textContent || $('t-url').innerText).trim();
      if (!url || url === '—') return toast('Construye una URL primero', 'warn');
      window.open(url, '_blank');
    }

    function injectScript() {
      const url = ($('t-url').textContent || $('t-url').innerText).trim();
      if (!url || url === '—') return toast('Construye una URL primero', 'warn');
      const s = document.createElement('script');
      s.src = url;
      s.onload = () => { $('t-out').className = 'out ok'; $('t-out').textContent = '✓ Inyectado — revisa consola'; };
      s.onerror = () => { $('t-out').className = 'out er'; $('t-out').textContent = '✗ Error al inyectar — revisa CORS'; };
      document.head.appendChild(s);
    }

    function copyUrl() {
      const url = ($('t-url').textContent || $('t-url').innerText).trim();
      if (!url || url === '—') return;
      navigator.clipboard?.writeText(url);
      toast('✓ URL copiada');
    }

    // ── URL Builder panel ──────────────────────────────────────────────────────
    function refreshUrlTags() {
      const c = $('u-mod-tags'); if (!c) return;
      c.innerHTML = Object.keys(manifest).map(k =>
        `<span class="tag tag-mod" onclick="addUrlNeedsTag('${k}')">${k}</span>`
      ).join('');
    }

    function addUrlNeedsTag(name) {
      const el = $('u-needs');
      const cur = el.value.split(',').map(s => s.trim()).filter(Boolean);
      if (!cur.includes(name)) cur.push(name);
      el.value = cur.join(',');
      buildUrlPanel();
    }

    function buildUrlPanel() {
      const page = $('u-page').value;
      const lib = $('u-lib').value;
      const hdr = $('u-header').checked;
      const nc = $('u-nocache').checked;
      const n = $('u-needs').value.trim();
      const srv_ = srv();

      const parts = [];
      if (page) parts.push('page=' + page);
      if (lib) parts.push('libmod=' + lib);
      if (hdr) parts.push('header=true');
      if (n) parts.push('needs=' + n);
      if (nc) parts.push('nocache=1');

      if (!parts.length) { $('u-url').textContent = '—'; $('u-preview').textContent = '—'; return; }

      const url = srv_ + '/bundle?' + parts.join('&');
      $('u-url').innerHTML = colorizeUrl(url);

      // Preview
      let preview = '';
      if (page && pages[page]) {
        const cfg = pages[page];
        const h = cfg.head || [], b = cfg.body_end || [];
        const extra = n ? n.split(',').map(s => s.trim()).filter(Boolean) : [];
        preview = [
          `Página: ${page}`,
          h.length ? `  head     → ${h.join(' → ')}` : '  head     → (vacío)',
          (!hdr && b.length) ? `  body_end → ${b.join(' → ')}` : hdr ? '  body_end → (omitido)' : '  body_end → (vacío)',
          extra.length ? `  extra    → ${extra.join(', ')}` : '',
        ].filter(Boolean).join('\n');
      }
      if (lib && libmods[lib]) {
        const lcfg = libmods[lib];
        const lh = (lcfg.head || []).map(f => f.file || f).join(' → ');
        const lb = (lcfg.body_end || []).map(f => f.file || f).join(' → ');
        preview += (preview ? '\n\n' : '') + [
          `LibMod: ${lib} (base: ${lcfg.basePath || '/'})`,
          lh ? `  head     → ${lh}` : '  head     → (vacío)',
          !hdr && lb ? `  body_end → ${lb}` : hdr ? '  body_end → (omitido)' : '',
        ].filter(Boolean).join('\n');
      }
      if (!preview && n) preview = `?needs → ${n}`;
      $('u-preview').textContent = preview || '—';
    }

    function openUrlPanel() {
      const url = ($('u-url').textContent || $('u-url').innerText).trim();
      if (!url || url === '—') return toast('Configura la URL primero', 'warn');
      window.open(url, '_blank');
    }

    function copyUrlPanel() {
      const url = ($('u-url').textContent || $('u-url').innerText).trim();
      if (!url || url === '—') return;
      navigator.clipboard?.writeText(url);
      toast('✓ URL copiada');
    }

    function copyTag() {
      const url = ($('u-url').textContent || $('u-url').innerText).trim();
      if (!url || url === '—') return toast('Configura la URL primero', 'warn');
      navigator.clipboard?.writeText(`<script src="${url}"><\/script>`);
      toast('✓ Tag copiado');
    }

    // ── Invalidate ─────────────────────────────────────────────────────────────
    async function invalidate() {
      try {
        const res = await fetch(`${srv()}/bundle/invalidate`, { method: 'POST', headers: hdrs() });
        const d = await res.json();
        if (!d.ok) throw new Error(d.error);
        toast(`✓ Cache limpiada — módulos: ${d.cleared.modules}, bundles: ${d.cleared.bundles}`);
      } catch (e) { toast(e.message, 'er'); }
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    $('srv').addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
    $('apikey').addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
    setTesterMode('needs');
    connect();
  </script>
